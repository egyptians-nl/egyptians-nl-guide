site_name: Egyptians NL Guide
site_description: Questions and practical guides for Egyptians living in the Netherlands.
site_url: https://egyptians-nl.github.io/egyptians-nl-guide/
use_directory_urls: true
copyright: Community-made guide for Egyptians in the Netherlands. <a class="footer-contribute" href="https://github.com/egyptians-nl/egyptians-nl-guide">Contribute on GitHub</a>

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
          nav_translations:
            Home: Home
            Getting Started: Getting Started
            Housing: Housing
            Healthcare: Healthcare
            Residence Permit: Residence Permit
            Work: Work
            FAQ: FAQ
            Important Links: Important Links
        - locale: ar
          name: العربية
          build: true
          site_name: دليل المصريين في هولندا
          nav_translations:
            Home: الرئيسية
            Getting Started: البداية
            Housing: السكن
            Healthcare: الرعاية الصحية
            Residence Permit: الإقامة والتصاريح
            Work: العمل
            FAQ: الأسئلة الشائعة
            Important Links: الروابط المهمة

markdown_extensions:
  - admonition
  - attr_list
  - tables

extra_css:
  - stylesheets/theme.css
  - stylesheets/home.css
  - stylesheets/rtl.css

extra_javascript:
  - javascripts/theme.js

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - Housing: housing/index.md
  - Healthcare: healthcare/index.md
  - Residence Permit: residence-permit/index.md
  - Work: work/index.md
  - FAQ: faq/index.md
  - Important Links: links/index.md
